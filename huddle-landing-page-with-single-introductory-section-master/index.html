<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <title>Huddle Landing Page</title>
  </head>

  <body>
    <header>
      <img src="images/logo.svg" alt="Huddle logo" class="logo" />
    </header>

    <main class="container">
      <div class="container-image">
        <img src="images/illustration-mockups.svg" alt="Mockup" />
      </div>

      <div class="container-content">
        <h1>Build The Community Your Fans Will Love</h1>
        <p>
          Huddle re-imagines the way we build communities. You have a voice, but
          so does your audience.Create connections with your users as you engage
          in genuine discussion.
        </p>
        <button class="btn">Register</button>
      </div>
    </main>

    <!-- ✅ MOVED OUTSIDE -->
    <footer class="attribution">
      <div class="icons">
        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#"><i class="fa-brands fa-twitter"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
      </div>
    </footer>
  </body>
</html>
